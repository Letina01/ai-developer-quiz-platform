name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend
        run: mvn -B -DskipTests package

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-publish:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ai-quiz-service-registry
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=service-registry
          - image: ai-quiz-api-gateway
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=api-gateway
          - image: ai-quiz-auth-service
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=auth-service
          - image: ai-quiz-quiz-service
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=quiz-service
          - image: ai-quiz-ai-service
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=ai-service
          - image: ai-quiz-result-service
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=result-service
          - image: ai-quiz-recommendation-service
            context: ./backend
            file: ./backend/Dockerfile
            build_args: SERVICE_NAME=recommendation-service
          - image: ai-quiz-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: VITE_API_BASE_URL=/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose and env template
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod.example"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            cp -n .env.prod.example .env
            sed -i "s/^GHCR_OWNER=.*/GHCR_OWNER=${{ github.repository_owner }}/" .env
            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d
