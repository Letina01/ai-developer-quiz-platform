server:
  port: 8083

spring:
  application:
    name: ai-service
  ai:
    openai:
      api-key: ${GROQ_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai}
      chat:
        api-key: ${GROQ_API_KEY:${OPENAI_API_KEY:}}
        options:
          model: ${GROQ_MODEL:llama-3.1-8b-instant}
          temperature: 0.7
          max-tokens: 1200

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.aidevquiz: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
