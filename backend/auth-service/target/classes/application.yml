server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/auth-service;MODE=MySQL;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
