spring:
  application:
    name: auth-service-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081
          jwk-set-uri: http://localhost:8081/oauth2/jwks

security:
  jwt:
    secret: test_super_secret_key_for_testing_purposes_only_256_bits_minimum
    expiration-ms: 3600000

app:
  frontend-url: http://localhost:5173

eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.aidevquiz: DEBUG
