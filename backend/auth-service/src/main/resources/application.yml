server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/auth-service;MODE=MySQL;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-for-testing-only-change-in-production-256-bits}
    expiration-ms: 86400000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

eureka:
  client:
    enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.aidevquiz: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
