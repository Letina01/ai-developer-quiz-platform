server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**, /oauth2/**, /login/oauth2/**

        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quizzes/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**

        - id: result-service
          uri: lb://result-service
          predicates:
            - Path=/api/results/**

        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/