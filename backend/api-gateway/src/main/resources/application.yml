server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: auth-oauth2
          uri: http://auth-service:8081
          predicates:
            - Path=/oauth2/**,/login/oauth2/**
          
        - id: quiz-service
          uri: http://quiz-service:8082
          predicates:
            - Path=/api/quizzes/**

        - id: ai-service
          uri: http://ai-service:8083
          predicates:
            - Path=/api/ai/**

        - id: result-service
          uri: http://result-service:8084
          predicates:
            - Path=/api/results/**

        - id: recommendation-service
          uri: http://recommendation-service:8085
          predicates:
            - Path=/api/recommendations/**

        - id: email-service
          uri: http://email-service:8086
          predicates:
            - Path=/api/email/**

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:dev-secret-key-for-testing-only-change-in-production-256-bits}

eureka:
  client:
    enabled: false

logging:
  level:
    root: INFO
    com.aidevquiz: DEBUG
    org.springframework.cloud.gateway: INFO
