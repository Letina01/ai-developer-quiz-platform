server:
  port: 8080

spring:
  application:
    name: api-gateway-test
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: quiz-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/quizzes/**
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**
        - id: result-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/results/**
        - id: recommendation-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/recommendations/**

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: test_super_secret_key_for_testing_purposes_only_256_bits_minimum_required

eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.aidevquiz: DEBUG
    org.springframework.cloud.gateway: DEBUG
