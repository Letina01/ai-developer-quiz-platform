server:
  port: 8084

spring:
  application:
    name: result-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_dev_quiz}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081
          jwk-set-uri: http://localhost:8081/oauth2/jwks

security:
  jwt:
    secret: ${JWT_SECRET}

app:
  quiz-service-url: ${QUIZ_SERVICE_URL:http://localhost:8082}
  internal-api-key: ${INTERNAL_API_KEY:change-me-internal}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.aidevquiz: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
